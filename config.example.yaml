# config.example.yaml — Rausu LLM API Gateway configuration example
#
# Copy this file to config.yaml and fill in your credentials.
# Environment variable interpolation: ${VAR_NAME}
# CLI override prefix: RAUSU__SERVER__PORT=8080

server:
  host: 127.0.0.1   # use 0.0.0.0 to expose on the network
  port: 4000

logging:
  level: info        # trace | debug | info | warn | error
  format: pretty     # json (structured) | pretty (human-readable)

models:
  # ── OpenAI (API key) ────────────────────────────────────────────────────────
  - name: gpt-4o
    providers:
      - provider: openai
        model: gpt-4o
        api_key: "${OPENAI_API_KEY}"

  - name: o3
    providers:
      - provider: openai
        model: o3
        api_key: "${OPENAI_API_KEY}"

  # ── Anthropic (API key) ──────────────────────────────────────────────────────
  - name: claude-sonnet
    providers:
      - provider: anthropic
        model: claude-sonnet-4-20250514
        api_key: "${ANTHROPIC_API_KEY}"

  # ── ChatGPT subscription (Plus / Pro / Max — no API key required) ────────────
  # token_source: auto  →  tries CHATGPT_ACCESS_TOKEN env var first,
  #                        then ~/.config/rausu/chatgpt-auth.json
  - name: gpt-5
    providers:
      - provider: chatgpt-subscription
        model: gpt-5.4
        token_source: auto

  - name: gpt-5-codex
    providers:
      - provider: chatgpt-subscription
        model: gpt-5.3-codex
        token_source: auto

  # ── GitHub Copilot (subscription — no API key required) ─────────────────────
  # Token loaded from ~/.config/github-copilot/hosts.json
  # (written by `gh auth login` or the Copilot VS Code / JetBrains extension)
  #
  # Note: GH_TOKEN / GITHUB_TOKEN env vars are NOT supported — PATs are
  # incompatible with the Copilot token exchange endpoint.
  #
  # Upstream model names: gpt-4o, claude-3.5-sonnet, o1-mini, etc.
  # (Copilot model availability depends on your subscription tier.)
  - name: copilot-gpt-4o
    providers:
      - provider: github-copilot
        model: gpt-4o

  - name: copilot-claude-sonnet
    providers:
      - provider: github-copilot
        model: claude-3.5-sonnet

  # Optional: use a specific hosts.json path
  # - name: copilot-custom
  #   providers:
  #     - provider: github-copilot
  #       model: gpt-4o
  #       credentials_path: /path/to/custom/hosts.json

  # ── Claude subscription (Pro / Max — no API key required) ────────────────────
  # token_source: auto  →  tries CLAUDE_OAUTH_TOKEN env var first,
  #                        then ~/.claude/.credentials.json (written by Claude CLI)
  #
  # Use the exact model ID as the virtual name so Claude Code works without changes.
  - name: claude-sonnet-4-20250514
    providers:
      - provider: claude-subscription
        model: claude-sonnet-4-20250514
        token_source: auto

  - name: claude-opus-4-20250514
    providers:
      - provider: claude-subscription
        model: claude-opus-4-20250514
        token_source: auto

  # ── Google Vertex AI (Gemini models) ─────────────────────────────────────────
  # Requires a GCP project with the Vertex AI API enabled.
  #
  # Authentication (first match wins):
  #   1. credentials_path   — explicit path to service-account JSON or ADC JSON
  #   2. GOOGLE_APPLICATION_CREDENTIALS env var
  #   3. ~/.config/gcloud/application_default_credentials.json  (default ADC)
  #
  # To use Application Default Credentials:
  #   gcloud auth application-default login
  #
  # To use a service account:
  #   1. Create a service account with "Vertex AI User" role in IAM.
  #   2. Download the JSON key file.
  #   3. Set credentials_path to that file (or GOOGLE_APPLICATION_CREDENTIALS).
  #
  # Docker deployment example:
  #   docker run -v /path/to/adc.json:/app/adc.json \
  #              -e GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json ...
  #
  # location: GCP region (e.g. us-central1, europe-west4) or "global".
  # project_id: your GCP project ID (required).
  - name: gemini-2.5-pro
    providers:
      - provider: vertex-ai
        model: gemini-2.5-pro-preview-05-06
        project_id: "${GCP_PROJECT_ID}"
        location: us-central1
        # credentials_path: /path/to/service-account.json  # optional

  - name: gemini-2.0-flash
    providers:
      - provider: vertex-ai
        model: gemini-2.0-flash-001
        project_id: "${GCP_PROJECT_ID}"
        location: us-central1

  # Global endpoint (lower latency in some regions):
  # - name: gemini-global
  #   providers:
  #     - provider: vertex-ai
  #       model: gemini-2.5-pro-preview-05-06
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: global
