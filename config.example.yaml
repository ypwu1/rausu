  # - name: claude-sonnet-4
  #   aliases:
  #     - claude-sonnet-4-20250514
  #   providers:
  #     - provider: vertex-ai
  #       model: "claude-sonnet-4@20250514"
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: us-east5
  #
  # - name: claude-opus-4
  #   aliases:
  #     - claude-opus-4-20250514
  #   providers:
  #     - provider: vertex-ai
  #       model: "claude-opus-4@20250514"
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: us-east5
