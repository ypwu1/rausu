# config.example.yaml — Rausu LLM API Gateway configuration example
#
# Copy this file to config.yaml and fill in your credentials.
# Environment variable interpolation: ${VAR_NAME}
# CLI override prefix: RAUSU__SERVER__PORT=8080

server:
  host: 127.0.0.1   # use 0.0.0.0 to expose on the network
  port: 4000

logging:
  level: info        # trace | debug | info | warn | error
  format: pretty     # json (structured) | pretty (human-readable)

# ── Authentication ─────────────────────────────────────────────────────────────
# mode: disabled (default) — no auth, suitable for local-only (127.0.0.1) use.
# mode: static           — clients must send Authorization: Bearer <key>.
#
# Uncomment the block below to enable static auth (recommended when host is 0.0.0.0).
# Key values support ${ENV_VAR} interpolation.
#
# auth:
#   mode: static
#   keys:
#     - name: "my-laptop"
#       key: "rausu-sk-abc123"
#     - name: "ci-server"
#       key: "${RAUSU_API_KEY}"

models:
  # ── OpenAI (API key) ────────────────────────────────────────────────────────
  - name: gpt-4o
    providers:
      - provider: openai
        model: gpt-4o
        api_key: "${OPENAI_API_KEY}"

  - name: o3
    providers:
      - provider: openai
        model: o3
        api_key: "${OPENAI_API_KEY}"

  # ── OpenRouter (API key — access 100+ models through a single key) ──────────
  # Get an API key at https://openrouter.ai/keys
  # Model IDs use the provider/model format (e.g. "openai/gpt-4o",
  # "anthropic/claude-sonnet-4"). See https://openrouter.ai/models for the
  # full catalogue.
  - name: openrouter-gpt-4o
    providers:
      - provider: openrouter
        model: openai/gpt-4o
        api_key: "${OPENROUTER_API_KEY}"

  - name: openrouter-claude-sonnet
    providers:
      - provider: openrouter
        model: anthropic/claude-sonnet-4
        api_key: "${OPENROUTER_API_KEY}"

  # Optional: use a custom base URL (e.g. self-hosted OpenRouter-compatible proxy)
  # - name: or-custom
  #   providers:
  #     - provider: openrouter
  #       model: openai/gpt-4o
  #       api_key: "${OPENROUTER_API_KEY}"
  #       base_url: "https://my-openrouter-proxy.example.com/api/v1"

  # ── Z.AI (API key — OpenAI-compatible) ───────────────────────────────────────
  # Get an API key at https://z.ai
  # Z.AI provides OpenAI-compatible endpoints. Model IDs follow Z.AI's naming
  # convention (e.g. "z-ai-1-preview"). See Z.AI documentation for available models.
  - name: z-ai-1-preview
    providers:
      - provider: z-ai
        model: z-ai-1-preview
        api_key: "${Z_AI_API_KEY}"

  # Optional: use a custom base URL
  # - name: z-ai-custom
  #   providers:
  #     - provider: z-ai
  #       model: z-ai-1-preview
  #       api_key: "${Z_AI_API_KEY}"
  #       base_url: "https://custom-zai-proxy.example.com/v4"

  # ── Moonshot / Kimi (API key — OpenAI-compatible) ────────────────────────────
  # Get an API key at https://platform.moonshot.cn
  # Default base URL: https://api.moonshot.ai/v1
  # Common model IDs: moonshot-v1-8k | moonshot-v1-32k | moonshot-v1-128k
  - name: moonshot-v1-8k
    providers:
      - provider: moonshot
        model: moonshot-v1-8k
        api_key: "${MOONSHOT_API_KEY}"

  - name: moonshot-v1-32k
    providers:
      - provider: moonshot
        model: moonshot-v1-32k
        api_key: "${MOONSHOT_API_KEY}"

  # Optional: use a custom base URL (e.g. self-hosted Moonshot-compatible proxy)
  # - name: moonshot-custom
  #   providers:
  #     - provider: moonshot
  #       model: moonshot-v1-8k
  #       api_key: "${MOONSHOT_API_KEY}"
  #       base_url: "https://my-moonshot-proxy.example.com/v1"

  # ── DeepSeek (API key — OpenAI-compatible) ────────────────────────────────────
  # Get an API key at https://platform.deepseek.com
  # Default base URL: https://api.deepseek.com
  # Note: https://api.deepseek.com/v1 also works for OpenAI client-library
  # compatibility, but the /v1 path is NOT a model-version signal.
  # Common model IDs: deepseek-chat | deepseek-reasoner
  - name: deepseek-chat
    providers:
      - provider: deepseek
        model: deepseek-chat
        api_key: "${DEEPSEEK_API_KEY}"

  - name: deepseek-reasoner
    providers:
      - provider: deepseek
        model: deepseek-reasoner
        api_key: "${DEEPSEEK_API_KEY}"

  # Optional: use a custom base URL (e.g. self-hosted DeepSeek-compatible proxy)
  # - name: deepseek-custom
  #   providers:
  #     - provider: deepseek
  #       model: deepseek-chat
  #       api_key: "${DEEPSEEK_API_KEY}"
  #       base_url: "https://my-deepseek-proxy.example.com"

  # ── Azure OpenAI (API key + Azure endpoint) ──────────────────────────────────
  # Get an API key from the Azure portal → your OpenAI resource → Keys and Endpoint.
  # base_url is REQUIRED: https://<resource-name>.openai.azure.com/
  # model is the Azure deployment name (not the OpenAI model ID).
  # api_version defaults to "2024-12-01-preview" when omitted.
  - name: gpt-4o-azure
    providers:
      - provider: azure-openai
        model: gpt-4o                     # Azure deployment name
        api_key: "${AZURE_OPENAI_API_KEY}"
        base_url: "https://my-resource.openai.azure.com/"
        # api_version: "2024-12-01-preview"   # optional; defaults to 2024-12-01-preview

  - name: gpt-4o-mini-azure
    providers:
      - provider: azure-openai
        model: gpt-4o-mini                # Azure deployment name
        api_key: "${AZURE_OPENAI_API_KEY}"
        base_url: "https://my-resource.openai.azure.com/"

  # Optional: use a specific API version
  # - name: o3-azure
  #   providers:
  #     - provider: azure-openai
  #       model: o3-deployment
  #       api_key: "${AZURE_OPENAI_API_KEY}"
  #       base_url: "https://my-resource.openai.azure.com/"
  #       api_version: "2025-01-01-preview"

  # ── Anthropic (API key) ──────────────────────────────────────────────────────
  - name: claude-sonnet
    providers:
      - provider: anthropic
        model: claude-sonnet-4-20250514
        api_key: "${ANTHROPIC_API_KEY}"

  # ── ChatGPT subscription (Plus / Pro / Max — no API key required) ────────────
  # token_source: auto  →  tries CHATGPT_ACCESS_TOKEN env var first,
  #                        then ~/.config/rausu/chatgpt-auth.json
  - name: gpt-5
    providers:
      - provider: chatgpt-subscription
        model: gpt-5.4
        token_source: auto

  - name: gpt-5-codex
    providers:
      - provider: chatgpt-subscription
        model: gpt-5.3-codex
        token_source: auto

  # ── GitHub Copilot (subscription — no API key required) ─────────────────────
  # Token loaded from ~/.config/github-copilot/hosts.json
  # (written by `gh auth login` or the Copilot VS Code / JetBrains extension)
  #
  # Note: GH_TOKEN / GITHUB_TOKEN env vars are NOT supported — PATs are
  # incompatible with the Copilot token exchange endpoint.
  #
  # Claude models → native /v1/messages passthrough (no protocol conversion)
  # Other models → /chat/completions with protocol translation
  #
  # Copilot model IDs use dots (claude-opus-4.6) while Claude Code uses
  # hyphens (claude-opus-4-6). The virtual `name` should match what the
  # client sends; `model` is the upstream Copilot identifier.

  # Claude models (native Anthropic passthrough)
  - name: claude-opus-4-6
    providers:
      - provider: github-copilot
        model: claude-opus-4.6

  - name: claude-sonnet-4-6
    providers:
      - provider: github-copilot
        model: claude-sonnet-4.6

  - name: claude-sonnet-4-5
    providers:
      - provider: github-copilot
        model: claude-sonnet-4.5

  - name: claude-haiku-4-5
    providers:
      - provider: github-copilot
        model: claude-haiku-4.5

  # OpenAI models (protocol-translated)
  - name: copilot-gpt-4o
    providers:
      - provider: github-copilot
        model: gpt-4o

  # - name: copilot-gpt-5.4
  #   providers:
  #     - provider: github-copilot
  #       model: gpt-5.4

  # Google models (protocol-translated)
  # - name: copilot-gemini-2.5-pro
  #   providers:
  #     - provider: github-copilot
  #       model: gemini-2.5-pro

  # Optional: use a specific hosts.json path
  # - name: copilot-custom
  #   providers:
  #     - provider: github-copilot
  #       model: gpt-4o
  #       credentials_path: /path/to/custom/hosts.json

  # ── Claude subscription (Pro / Max — no API key required) ────────────────────
  # token_source: auto  →  tries CLAUDE_OAUTH_TOKEN env var first,
  #                        then ~/.claude/.credentials.json (written by Claude CLI)
  #
  # Use the exact model ID as the virtual name so Claude Code works without changes.
  - name: claude-sonnet-4-20250514
    providers:
      - provider: claude-subscription
        model: claude-sonnet-4-20250514
        token_source: auto

  - name: claude-opus-4-20250514
    providers:
      - provider: claude-subscription
        model: claude-opus-4-20250514
        token_source: auto

  # ── Google Vertex AI (Gemini models) ─────────────────────────────────────────
  # Requires a GCP project with the Vertex AI API enabled.
  #
  # Authentication (first match wins):
  #   1. credentials_path   — explicit path to service-account JSON or ADC JSON
  #   2. GOOGLE_APPLICATION_CREDENTIALS env var
  #   3. ~/.config/gcloud/application_default_credentials.json  (default ADC)
  #
  # To use Application Default Credentials:
  #   gcloud auth application-default login
  #
  # To use a service account:
  #   1. Create a service account with "Vertex AI User" role in IAM.
  #   2. Download the JSON key file.
  #   3. Set credentials_path to that file (or GOOGLE_APPLICATION_CREDENTIALS).
  #
  # Docker deployment example:
  #   docker run -v /path/to/adc.json:/app/adc.json \
  #              -e GOOGLE_APPLICATION_CREDENTIALS=/app/adc.json ...
  #
  # location: GCP region (e.g. us-central1, europe-west4) or "global".
  # project_id: your GCP project ID (required).
  #
  # Gemini models use /v1/chat/completions (OpenAI-compatible, with format translation).
  - name: gemini-2.5-pro
    providers:
      - provider: vertex-ai
        model: gemini-2.5-pro
        project_id: "${GCP_PROJECT_ID}"
        location: us-central1
        # credentials_path: /path/to/service-account.json  # optional

  - name: gemini-2.5-flash
    providers:
      - provider: vertex-ai
        model: gemini-2.5-flash
        project_id: "${GCP_PROJECT_ID}"
        location: us-central1

  - name: gemini-2.0-flash
    providers:
      - provider: vertex-ai
        model: gemini-2.0-flash
        project_id: "${GCP_PROJECT_ID}"
        location: us-central1

  # ── Google Vertex AI (Claude models via Anthropic publisher) ─────────────────
  # Claude on Vertex uses /publishers/anthropic/models/{model}:rawPredict.
  # No format translation — the Anthropic Messages API body is forwarded as-is.
  # Auth: same GCP OAuth token as Gemini (no x-api-key needed).
  #
  # Claude models use /v1/messages (Anthropic Messages API, no format translation).
  #
  # Recommended locations for Claude on Vertex:
  #   us-east5, europe-west1, asia-southeast1  (check Model Garden for availability)
  #
  # Use the exact Claude model ID as the virtual name so Claude Code works
  # without any extra configuration.
  #
  # Pinned versions on Vertex use @ notation (e.g. claude-haiku-4-5@20251001),
  # but clients (e.g. Claude Code) typically send - notation (claude-haiku-4-5-20251001).
  # Use the `aliases` field to accept both.
  - name: claude-sonnet-4-6
    providers:
      - provider: vertex-ai
        model: claude-sonnet-4-6
        project_id: "${GCP_PROJECT_ID}"
        location: us-east5

  - name: claude-opus-4-6
    providers:
      - provider: vertex-ai
        model: claude-opus-4-6
        project_id: "${GCP_PROJECT_ID}"
        location: us-east5

  # The `aliases` field lets multiple names route to the same model entry.
  # Useful when clients may send either the short name or the full versioned ID.
  - name: claude-haiku-4-5
    aliases:
      - claude-haiku-4-5-20251001
    providers:
      - provider: vertex-ai
        model: "claude-haiku-4-5@20251001"
        project_id: "${GCP_PROJECT_ID}"
        location: us-east5

  - name: claude-sonnet-4-5
    aliases:
      - claude-sonnet-4-5-20250929
    providers:
      - provider: vertex-ai
        model: "claude-sonnet-4-5@20250929"
        project_id: "${GCP_PROJECT_ID}"
        location: us-east5

  # Older / legacy models (uncomment as needed):
  # - name: claude-opus-4-5
  #   aliases:
  #     - claude-opus-4-5-20251101
  #   providers:
  #     - provider: vertex-ai
  #       model: "claude-opus-4-5@20251101"
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: us-east5
  #
  # - name: claude-sonnet-4
  #   aliases:
  #     - claude-sonnet-4-20250514
  #   providers:
  #     - provider: vertex-ai
  #       model: "claude-sonnet-4@20250514"
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: us-east5
  #
  # - name: claude-opus-4
  #   aliases:
  #     - claude-opus-4-20250514
  #   providers:
  #     - provider: vertex-ai
  #       model: "claude-opus-4@20250514"
  #       project_id: "${GCP_PROJECT_ID}"
  #       location: us-east5

  # ── Google AI Studio (API key — OpenAI-compatible) ───────────────────────────
  # Get an API key at https://aistudio.google.com/apikey
  # Default base URL: https://generativelanguage.googleapis.com/v1beta/openai
  # Auth: x-goog-api-key header (NOT Bearer token)
  #
  # Note: This provider targets Google AI Studio (individual developer API keys).
  # For enterprise GCP deployments with project-based auth, use `provider: vertex-ai`.
  #
  # Common model IDs: gemini-2.5-pro | gemini-2.5-flash | gemini-2.0-flash | gemini-2.0-flash-lite
  - name: gemini-2.5-pro-studio
    providers:
      - provider: google-ai-studio
        model: gemini-2.5-pro
        api_key: "${GOOGLE_AI_STUDIO_API_KEY}"

  - name: gemini-2.0-flash-studio
    providers:
      - provider: google-ai-studio
        model: gemini-2.0-flash
        api_key: "${GOOGLE_AI_STUDIO_API_KEY}"

  # Optional: use a custom base URL
  # - name: gemini-custom
  #   providers:
  #     - provider: google-ai-studio
  #       model: gemini-2.5-flash
  #       api_key: "${GOOGLE_AI_STUDIO_API_KEY}"
  #       base_url: "https://custom-proxy.example.com/v1beta/openai"
